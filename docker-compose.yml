version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# PeerNexus – Full-Stack Docker Compose
#
# Usage:
#   docker compose up          # start all services
#   docker compose up --build  # rebuild images before starting
#   docker compose down -v     # stop and remove volumes
#
# Required environment variables (set in .env at project root or export):
#   DB_PASSWORD          – PostgreSQL password  (default: CHANGE_ME_STRONG_PASSWORD)
#   JWT_SECRET           – Base64 JWT signing secret  (default: dev value)
#   CLOUDINARY_CLOUD_NAME / CLOUDINARY_API_KEY / CLOUDINARY_API_SECRET
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: peernexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: peernexus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CHANGE_ME_STRONG_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d peernexus" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - peernexus-net

  # ── Spring Boot Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./peernexus-backend
      dockerfile: Dockerfile
    container_name: peernexus-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DB_URL: jdbc:postgresql://postgres:5432/peernexus
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-CHANGE_ME_STRONG_PASSWORD}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_BASE64_256BIT_KEY}
      # CORS — allow the frontend container
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://frontend}
      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-dev-cloud}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-dev-key}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-dev-secret}
      # Mail (set to real SMTP in prod)
      MAIL_HOST: ${MAIL_HOST:-smtp.example.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-change-me}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-change-me}
      # Spring profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - peernexus-net

  # ── React / Nginx Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./peernexus-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: peernexus-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - peernexus-net

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  peernexus-net:
    driver: bridge
