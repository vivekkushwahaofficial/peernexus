# =============================================================================
# application-dev.properties
# Development profile — safe defaults for local development
# =============================================================================

# ─── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/peernexus}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# Flyway disabled in dev temporarily to extract schema
# spring.flyway.enabled=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Let Hibernate update and generate schema
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=create
# spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=schema.sql
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.peernexus=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.socket=DEBUG

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ─── WebSocket ────────────────────────────────────────────────────────────────
# No additional config needed for dev; WebSocketConfig reads app.cors.allowed-origins

# ─── Cookie (dev: non-secure for HTTP) ───────────────────────────────────────
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
