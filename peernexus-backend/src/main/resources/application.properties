spring.application.name=peernexus
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# ─── Database ────────────────────────────────────────────────────────────────
# Set DB_URL, DB_USERNAME, DB_PASSWORD as environment variables.
# Never commit real credentials to source control.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/peernexus}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# ─── Flyway ──────────────────────────────────────────────────────────────────
# Flyway manages schema DDL. baseline-on-migrate allows Flyway to adopt
# databases that were previously created by Hibernate ddl-auto=update.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Generate a secure 256-bit base64 key for JWT_SECRET:
#   openssl rand -base64 32
# Never commit the actual value here.
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=900000
app.jwt.refresh-expiration-ms=2592000000
app.jwt.issuer=peernexus

# ─── CORS ────────────────────────────────────────────────────────────────────
# Comma-separated list of allowed frontend origins.
# Override via environment variable in production:
#   APP_CORS_ALLOWED_ORIGINS=https://peernexus.app
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ─── Application base URL ────────────────────────────────────────────────────
app.backend.base-url=${APP_BACKEND_BASE_URL:http://localhost:8080}

# ─── Mail ────────────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.example.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:change-me}
spring.mail.password=${MAIL_PASSWORD:change-me}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── Cloudinary ──────────────────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:development-cloud}
cloudinary.api-key=${CLOUDINARY_API_KEY:development-key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:development-secret}

# ─── File Upload Limits ──────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# ─── Graceful Shutdown ───────────────────────────────────────────────────────
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
