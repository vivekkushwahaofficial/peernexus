# =============================================================================
# application-prod.properties
# Production profile — all secrets from environment variables
# =============================================================================

# ─── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# HikariCP — production pool sizes
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Do NOT set baseline-on-migrate=true in production (prevent accidental schema resets)

# Let Hibernate validate — Flyway owns DDL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ─── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# ─── Cookie (prod: HTTPS only, strict) ───────────────────────────────────────
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.peernexus=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ─── Cloudinary ───────────────────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:development-cloud}
cloudinary.api-key=${CLOUDINARY_API_KEY:development-key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:development-secret}

# ─── Mail ─────────────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:change-me}
spring.mail.password=${MAIL_PASSWORD:change-me}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── Server ───────────────────────────────────────────────────────────────────
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ─── Compression ─────────────────────────────────────────────────────────────
server.compression.enabled=true
server.compression.mime-types=text/html,text/plain,application/json,application/javascript
server.compression.min-response-size=1024
